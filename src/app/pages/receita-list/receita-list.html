<div class="card" style="padding: 2rem;">
  
  <div style="display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap;">
    <input 
      type="text" 
      pInputText 
      placeholder="Buscar receita por nome..." 
      [(ngModel)]="filtroNome" 
      (ngModelChange)="aplicarFiltroNome()"
      style="width: 350px;">
  </div>

  <p-table [value]="receitas" [tableStyle]="{ 'min-width': '50rem' }">
    <ng-template #header>
      <tr>
        <th>Nome</th>
        <th>Categoria</th>
        <th>Tempo de Preparo</th>
        <th>Ações</th>
      </tr>
    </ng-template>

    <ng-template #body let-receita>
      <tr>
        <td>
          <strong>{{ receita.nome }}</strong>
        </td>
        
        <td>{{ receita.categoria }}</td>
        
        <td>{{ receita.tempoPreparo }} min</td> <td>
          <div style="display: flex; gap: 0.5rem;">
            <p-button
              icon="pi pi-eye"
              label="Detalhes"
              severity="info"
              size="small"
              (onClick)="detalhesReceita(receita.id)">
            </p-button>

            <p-button
              icon="pi pi-trash"
              label="Excluir"
              severity="danger"
              size="small"
              (onClick)="excluirReceita(receita.id)">
            </p-button>
          </div>
        </td>
      </tr>
    </ng-template>
    
<ng-template #empty>
        <tr>
            <td colspan="4" style="text-align: center; padding: 3rem; color: #64748b;">
                <div style="display: flex; flex-direction: column; align-items: center; gap: 0.5rem;">
                    <i class="pi pi-folder-open" style="font-size: 2.5rem; color: #94a3b8;"></i>
                    <span style="font-size: 1.1rem; font-weight: 500;">Nenhuma receita cadastrada.</span>
                    <small style="color: #94a3b8;">Clique em "Cadastrar" no topo para adicionar a sua primeira receita!</small>
                </div>
            </td>
        </tr>
    </ng-template>
  </p-table>
</div>

<p-confirmDialog></p-confirmDialog>
