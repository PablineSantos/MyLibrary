<div class="card" style="padding: 2rem;">
  
  <div style="display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap;">
    <input 
      type="text" 
      pInputText 
      placeholder="Buscar receita por nome..." 
      [(ngModel)]="filtroNome" 
      (ngModelChange)="aplicarFiltroNome()"
      style="width: 350px;">
  </div>

  <p-table [value]="receitas" [tableStyle]="{ 'min-width': '50rem' }">
    <ng-template #header>
      <tr>
        <th>Nome</th>
        <th>Categoria</th>
        <th>Tempo de Preparo</th>
        <th>Ações</th>
      </tr>
    </ng-template>

    <ng-template #body let-receita>
      <tr>
        <td>
          <strong>{{ receita.nome }}</strong>
        </td>
        
        <td>{{ receita.categoria }}</td>
        
        <td>{{ receita.tempoPreparo }} min</td> <td>
          <div style="display: flex; gap: 0.5rem;">
            <p-button
              icon="pi pi-eye"
              label="Detalhes"
              severity="info"
              size="small"
              (onClick)="detalhesReceita(receita.id)">
            </p-button>

            <p-button
              icon="pi pi-trash"
              label="Excluir"
              severity="danger"
              size="small"
              (onClick)="excluirReceita(receita.id)">
            </p-button>
          </div>
        </td>
      </tr>
    </ng-template>
    
    <ng-template #empty>
        <tr>
            <td colspan="4" style="text-align: center; padding: 2rem;">
                Nenhuma receita cadastrada.
            </td>
        </tr>
    </ng-template>
  </p-table>
</div>

<p-confirmDialog></p-confirmDialog>
